<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Profile | LOAN ADDA</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            overflow-x: hidden;
            color: #fff;
            padding: 20px;
        }

        /* ---------------- Animated Blob Background (Prediction Theme) ---------------- */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 450px;
            height: 450px;
            background: #3b82f6;
            top: -150px;
            left: -150px;
            border-radius: 50%;
        }

        .blob-2 {
            width: 550px;
            height: 550px;
            background: #8b5cf6;
            bottom: -200px;
            right: -150px;
            border-radius: 50%;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background: #ec4899;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            animation-duration: 15s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(40px, 60px) scale(1.1);
            }
        }

        /* ---------------- Floating Theme Effects (15 Icons Version) ---------------- */
        .effect-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .floating-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.15));
            animation: floatup linear infinite;
        }

        .icon-1 {
            left: 5%;
            bottom: -80px;
            font-size: 3rem;
            animation-duration: 14s;
        }

        .icon-2 {
            left: 15%;
            bottom: -80px;
            font-size: 2rem;
            animation-duration: 17s;
        }

        .icon-3 {
            left: 25%;
            bottom: -80px;
            font-size: 4rem;
            animation-duration: 20s;
        }

        .icon-4 {
            left: 35%;
            bottom: -80px;
            font-size: 2.5rem;
            animation-duration: 15s;
        }

        .icon-5 {
            left: 45%;
            bottom: -80px;
            font-size: 3.5rem;
            animation-duration: 24s;
        }

        .icon-6 {
            left: 55%;
            bottom: -80px;
            font-size: 2.2rem;
            animation-duration: 18s;
        }

        .icon-7 {
            left: 65%;
            bottom: -80px;
            font-size: 3.2rem;
            animation-duration: 19s;
        }

        .icon-8 {
            left: 75%;
            bottom: -80px;
            font-size: 1.8rem;
            animation-duration: 15s;
        }

        .icon-9 {
            left: 85%;
            bottom: -80px;
            font-size: 4.5rem;
            animation-duration: 23s;
        }

        .icon-10 {
            left: 95%;
            bottom: -80px;
            font-size: 2.7rem;
            animation-duration: 16s;
        }

        .icon-11 {
            left: 10%;
            bottom: -80px;
            font-size: 2rem;
            animation-duration: 19s;
        }

        .icon-12 {
            left: 30%;
            bottom: -80px;
            font-size: 3.5rem;
            animation-duration: 24s;
        }

        .icon-13 {
            left: 50%;
            bottom: -80px;
            font-size: 2.5rem;
            animation-duration: 17s;
        }

        .icon-14 {
            left: 70%;
            bottom: -80px;
            font-size: 4rem;
            animation-duration: 25s;
        }

        .icon-15 {
            left: 90%;
            bottom: -80px;
            font-size: 3rem;
            animation-duration: 21s;
        }

        @keyframes floatup {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ---------------- Container & Glassmorphism ---------------- */
        .container {
            position: relative;
            width: 1000px;
            max-width: 95%;
            height: 720px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
            display: flex;
            z-index: 10;
            overflow: hidden;
            animation: fadeInContainer 1s ease-out;
        }

        @keyframes fadeInContainer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------------- Form Section (Registration) ---------------- */
        .form-section {
            width: 60%;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        .form-section h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 35px;
            color: #ffffff;
            text-align: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 30px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 30px 10px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            left: 0;
            top: 10px;
            color: #cbd5e1;
            font-size: 13px;
            pointer-events: none;
            transition: 0.3s ease;
        }

        .input-group input:focus~label,
        .input-group input:valid~label {
            top: -18px;
            font-size: 11px;
            color: #d8b4fe;
            font-weight: 600;
        }

        .input-group i {
            position: absolute;
            right: 0;
            top: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        .input-group input:focus {
            border-bottom-color: #a855f7;
        }

        .input-group input:focus~i {
            color: #a855f7;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }

        .signup-btn {
            grid-column: span 2;
            padding: 15px;
            background: linear-gradient(to right, #6b21c4, #8a2be2, #9932cc);
            background-size: 200% auto;
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.4s;
            box-shadow: 0 8px 15px rgba(138, 43, 226, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .signup-btn:hover {
            background-position: right center;
            box-shadow: 0 12px 25px rgba(153, 50, 204, 0.5);
            transform: translateY(-2px);
        }

        /* ---------------- Info Section ---------------- */
        .info-section {
            width: 40%;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15), transparent 80%);
        }

        .info-section h1 {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #ffffff 30%, #ffabe1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-section p {
            font-size: 13px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.7;
        }

        @media (max-width: 850px) {
            .container {
                flex-direction: column;
                height: auto;
                border-radius: 20px;
            }

            .form-section,
            .info-section {
                width: 100%;
                padding: 40px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .info-section {
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>

<body>

    <!-- Animated Blobs (Prediction Theme) -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Floating Financial Icons (15 Icons Version) -->
    <div class="effect-container">
        <i class="fa-solid fa-coins floating-icon icon-1"></i>
        <i class="fa-solid fa-wallet floating-icon icon-2"></i>
        <i class="fa-solid fa-chart-line floating-icon icon-3"></i>
        <i class="fa-solid fa-hand-holding-dollar floating-icon icon-4"></i>
        <i class="fa-solid fa-building-columns floating-icon icon-5"></i>
        <i class="fa-solid fa-sack-dollar floating-icon icon-6"></i>
        <i class="fa-solid fa-piggy-bank floating-icon icon-7"></i>
        <i class="fa-solid fa-credit-card floating-icon icon-8"></i>
        <i class="fa-solid fa-receipt floating-icon icon-9"></i>
        <i class="fa-solid fa-money-bill-wave floating-icon icon-10"></i>
        <i class="fa-solid fa-scale-balanced floating-icon icon-11"></i>
        <i class="fa-solid fa-file-invoice-dollar floating-icon icon-12"></i>
        <i class="fa-solid fa-landmark floating-icon icon-13"></i>
        <i class="fa-solid fa-money-check-dollar floating-icon icon-14"></i>
        <i class="fa-solid fa-money-bills floating-icon icon-15"></i>
    </div>

    <div class="container">
        <div class="form-section">
            <h2>Create Your Profile</h2>

            <form class="form-grid" id="reg-form">
                <div class="input-group full-width">
                    <input type="text" id="p_name" required>
                    <label>Full Name</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-group">
                    <input type="email" id="p_email" required>
                    <label>Gmail Address</label>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="input-group">
                    <input type="tel" id="p_phone" required maxlength="10">
                    <label>Phone Number</label>
                    <i class="fa-solid fa-phone"></i>
                </div>

                <div class="input-group">
                    <input type="text" id="p_username" required>
                    <label>Username</label>
                    <i class="fa-solid fa-user-tag"></i>
                </div>

                <div class="input-group">
                    <input type="password" id="p_password" required>
                    <label>Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="input-group">
                    <input type="number" id="p_age" required min="18">
                    <label>Age</label>
                    <i class="fa-solid fa-calendar-day"></i>
                </div>

                <div class="input-group">
                    <input type="number" id="p_income" required>
                    <label>Monthly Income (₹)</label>
                    <i class="fa-solid fa-money-bill-trend-up"></i>
                </div>

                <button type="button" class="signup-btn" onclick="submitForm()">
  Sign up <i class="fa-solid fa-arrow-right"></i>
</button>

                <p
                    style="grid-column: span 2; text-align: center; font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 5px;">
                    By signing up, you agree to our Terms, Privacy Policy and Cookies Policy.
                </p>
            </form>
        </div>

        <div class="info-section">
            <h1>JOIN THE<br>FUTURE!</h1>
            <p>Start your financial journey with LOAN ADDA's intelligent tools and personalized loan matching algorithm.
            </p>
        </div>
    </div>

    <script>
        document.getElementById('reg-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('p_email').value;
            if (!email.endsWith('@gmail.com')) {
                alert('Please use a valid @gmail.com address');
                return;
            }

            // Save data to localStorage
            localStorage.setItem('prof_name', document.getElementById('p_name').value);
            localStorage.setItem('prof_email', email);
            localStorage.setItem('prof_phone', document.getElementById('p_phone').value);
            localStorage.setItem('prof_username', document.getElementById('p_username').value);
            localStorage.setItem('prof_password', document.getElementById('p_password').value);
            localStorage.setItem('prof_age', document.getElementById('p_age').value);
            localStorage.setItem('prof_income', document.getElementById('p_income').value);

            // Redirect to dashboard
            window.location.href = '../3)dash board/index.html';
        });
    </script>
    <script type="module">
import { db } from "../firebase.js";
import { addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

window.submitForm = async function () {
  const data = {
    name: document.getElementById("p_name").value,
    email: document.getElementById("p_email").value,
    phone: document.getElementById("p_phone").value,
    username: document.getElementById("p_username").value,
    password: document.getElementById("p_password").value,
    age: document.getElementById("p_age").value,
    income: document.getElementById("p_income").value
  };

  await addDoc(collection(db, "users"), data);

  alert("Data saved successfully 🚀");
};
</script>
</body>

</html>
