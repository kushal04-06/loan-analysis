<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="analytics.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <!-- Background Waves/Dots (Optional aesthetic) -->
    <div class="bg-pattern"></div>

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
            </div>
            <div class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </div>
            <div class="nav-item logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
        </aside>

        <!-- Main Dashboard Area -->
        <main class="dashboard-grid">
            
            <!-- OVERVIEW -->
            <div class="card overview-card">
                <div class="card-header">
                    <h2>Overview</h2>
                    <select class="dropdown-filter">
                        <option>Activity</option>
                    </select>
                </div>
                <div class="chart-container">
                    <canvas id="overviewChart"></canvas>
                </div>
            </div>

            <!-- LOAN PORTFOLIO -->
            <div class="card portfolio-card">
                <div class="card-header">
                    <h2>Loan Portfolio</h2>
                    <span class="more-options">⋮</span>
                </div>
                
                <div class="portfolio-content">
                    <div class="portfolio-top">
                        <div class="portfolio-left">
                            
                            <div class="gauge-block balance-block">
                                <svg viewBox="0 0 100 50" class="gauge-svg">
                                    <path d="M 10 50 A 40 40 0 0 1 90 50" class="bg-arc"/>
                                    <path class="animated-arc arc-blue" id="arc-balance" d="M 10 50 A 40 40 0 0 1 90 50" stroke-dasharray="125" stroke-dashoffset="30"/>
                                </svg>
                                <div class="gauge-text">
                                    <span class="label">Balance</span>
                                    <span class="val" id="val-balance">₹63.0B</span>
                                </div>
                            </div>

                            <div class="portfolio-stats" style="border:none; margin:0; padding:0; justify-content:space-between; width:100%; margin-top:20px;">
                                <div class="gauge-block rate-block" style="width: 48%;">
                                    <span style="font-size:11px; color:var(--text-muted); display:block; margin-bottom:5px;">Progress <strong id="val-progress" style="color:#4ade80;">₹28.0 kh</strong></span>
                                    <svg viewBox="0 0 100 50" class="gauge-svg">
                                        <path d="M 10 50 A 40 40 0 0 1 90 50" class="bg-arc"/>
                                        <path class="animated-arc arc-green" id="arc-progress" d="M 10 50 A 40 40 0 0 1 90 50" stroke-dasharray="125" stroke-dashoffset="60"/>
                                    </svg>
                                </div>
                                <div class="gauge-block rate-block" style="width: 48%;">
                                    <span style="font-size:11px; color:var(--text-muted); display:block; margin-bottom:5px;">Rates <strong style="color:#fff;">6.0%</strong></span>
                                    <svg viewBox="0 0 100 50" class="gauge-svg">
                                        <path d="M 10 50 A 40 40 0 0 1 90 50" class="bg-arc"/>
                                        <path class="animated-arc" style="stroke:#c084fc;" id="arc-rates" d="M 10 50 A 40 40 0 0 1 90 50" stroke-dasharray="125" stroke-dashoffset="100"/>
                                    </svg>
                                    <div class="gauge-text" style="bottom:-15px;">
                                        <span class="val" id="val-rates">7.77%</span>
                                    </div>
                                </div>
                            </div>

                        </div>
                        <div class="portfolio-right">
                            <div class="donut-container">
                                <canvas id="portfolioDonut"></canvas>
                            </div>
                        </div>
                    </div>
                
                    <div class="loan-progress-bar">
                        <div class="label-row">
                            <span>Loan Progress</span>
                            <span>30%</span>
                        </div>
                        <div class="bar-bg">
                            <div class="bar-fill" id="val-loan-progress" style="width: 50%;"></div>
                            <div class="marker" style="left: 50%;"></div>
                        </div>
                        <div class="bottom-labels">
                            <span class="paid"><span class="dot"></span> Paid</span>
                            <span class="pct1">50%</span>
                            <span class="pct2">35%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LOAN ANALYTICS -->
            <div class="card analytics-card">
                <div class="card-header">
                    <h2>Loan Analytics</h2>
                    <div class="legend">
                        <span><span class="dot blue"></span> Payment History</span>
                        <span><span class="dot green"></span> Principal Paid</span>
                        <span><span class="dot teal"></span> Interest Paid</span>
                    </div>
                </div>
                <div class="chart-container" style="height: 180px;">
                    <canvas id="analyticsChart"></canvas>
                </div>
            </div>

            <!-- GROWTH METRICS -->
            <div class="card growth-card">
                <div class="card-header">
                    <h2>Growth Metrics</h2>
                </div>
                <div class="growth-bar-chart" id="growthMetricsContainer">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- UPCOMING PAYMENTS -->
            <div class="card payments-card">
                <div class="card-header">
                    <h2>Upcoming Payments</h2>
                    <span class="arrow">&gt;</span>
                </div>
                <div class="calendar" id="calendarGrid">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- RECENT TRANSACTIONS -->
            <div class="card transactions-card">
                <div class="card-header">
                    <h2>Recent Transactions</h2>
                </div>
                <div class="transaction-list">
                    <div class="transaction-item">
                        <div class="t-icon blue"></div>
                        <div class="t-lines">
                            <div class="tl-1"></div>
                            <div class="tl-2"></div>
                        </div>
                        <div class="t-spark"><canvas id="spark1"></canvas></div>
                        <div class="t-spark"><canvas id="spark2"></canvas></div>
                    </div>
                    <div class="transaction-item">
                        <div class="t-icon green"></div>
                        <div class="t-lines">
                            <div class="tl-1"></div>
                            <div class="tl-2"></div>
                        </div>
                        <div class="t-spark"><canvas id="spark3"></canvas></div>
                        <div class="t-spark"><canvas id="spark4"></canvas></div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- FLOATING ACTION BUTTON -->
    <button class="fab" id="openFormBtn">⚙️ Update Data</button>

    <!-- DATA INPUT MODAL -->
    <div class="modal" id="dataModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Update Dashboard Data</h2>
                <span class="close-modal" id="closeFormBtn">&times;</span>
            </div>
            <div class="modal-body">
                <form id="dashboardForm">
                    <div class="input-group">
                        <label>Balance (e.g. ₹63.0B)</label>
                        <input type="text" id="in-balance" value="₹63.0B">
                    </div>
                    <div class="input-group">
                        <label>Progress</label>
                        <input type="text" id="in-progress" value="₹28.0 kh">
                    </div>
                    <div class="input-group">
                        <label>Rates</label>
                        <input type="text" id="in-rates" value="7.77%">
                    </div>
                    <div class="input-group">
                        <label>Loan Progress % (0-100)</label>
                        <input type="number" id="in-loan-progress" value="50" min="0" max="100">
                    </div>
                    <hr>
                    <div class="input-group">
                        <label>Overview Chart Data (comma separated)</label>
                        <input type="text" id="in-overview-1" value="10, 60, 40, 90, 160, 60, 190">
                        <input type="text" id="in-overview-2" style="margin-top: 5px;" value="10, 40, 80, 50, 130, 90, 160">
                        <input type="text" id="in-overview-3" style="margin-top: 5px;" value="80, 60, 120, 100, 180, 140, 220">
                    </div>
                    <button type="submit" class="submit-btn">Save Changes</button>
                </form>
            </div>
        </div>
    </div>

    <script src="analytics.js"></script>
</body>
</html>
